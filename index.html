<!DOCTYPE html>
<html>
<head>
    <title>Activity 7 - Y2K Theme</title>

    <style>

        *{
            margin:0;
            padding:0;

        }

        body{
            font-family:Verdana, sans-serif;
            color:white;
            background:

            gap:10px;
            padding:14px 20px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
        }

        nav a{
            text-decoration:none;
            color:white;
            padding:10px 18px;
            border-radius:30px;
            background:
            linear-gradient(135deg,#ff00cc,#00e5ff);
        }

        #login-screen{
            position:fixed;
            inset:0;
            z-index:9999;
            display:flex;
            align-items:center;
            justify-content:center;
            background:
            linear-gradient(
            rgba(0,0,0,0.7),
            rgba(0,0,0,0.7));
        }

        #main-content{
            display:none;
        }

        .login-box{
            width:380px;
            padding:40px;
            border-radius:28px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(18px);

            box-shadow:
            0 0 25px #ff00cc,
            0 0 40px #00e5ff;
        }

        .login-box h1{
            font-size:36px;
            margin-bottom:10px;

        .login-box p{

            color:white;
            outline:none;
        }

        .login-box button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:30px;
            background:
            linear-gradient(135deg,#ff00cc,#00e5ff);
            color:white;
            font-weight:bold;

        }

        .page{
            display:none;

</head>

<body>

<div id="login-screen">

    <div class="login-box">

        <h1>Y2K PLAYER ✦</h1>

        <p>Enter the digital dreamworld</p>

        <input type="text" id="username" placeholder="Username">

        <input type="password" id="password" placeholder="Password">

</div>

<div id="main-content">

<nav>

</nav>

</div>

<script>

function doLogin(){

    document.getElementById('main-content')
    .style.display='block';

    document.getElementById('page1')
    .style.display='flex';
}

</script>

</body>
</html>
